name: Build LaTeX PDF - Resume & Cover Letter

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose
        run: |
          echo "Triggered on $GITHUB_REF@${GITHUB_SHA}"
          ls -la || true

      - name: Compile Resume (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "main.tex main_vi.tex MBF_main_vi.tex go_devops_main_vi.tex system_main_vi.tex"
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          extra_system_packages: |
          pre_compile: |
            tlmgr option repository https://mirrors.rit.edu/CTAN/systems/texlive/tlnet
            tlmgr update --self
            tlmgr install fontawesome5 fontspec lm babel-english

      - name: Rename Resume PDF
        run: |
          cp main.pdf Pham_Huy_Thanh_Resume.pdf
          cp main_vi.pdf Pham_Huy_Thanh_Resume_VI.pdf
          cp MBF_main_vi.pdf Pham_Huy_Thanh_Digital_Specialist_VI.pdf
          cp go_devops_main_vi.pdf Pham_Huy_Thanh_Backend_DevOps_VI.pdf
          cp system_main_vi.pdf Pham_Huy_Thanh_System_Engineer_VI.pdf

      - name: Compile Cover Letter (XeLaTeX)
        if: hashFiles('cover_letter.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "cover_letter.tex cover_letter_vi.tex"
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          pre_compile: |
            tlmgr option repository https://mirrors.rit.edu/CTAN/systems/texlive/tlnet
            tlmgr update --self
            tlmgr install fontawesome5 fontspec lm babel-english

      - name: Rename Cover Letter PDF
        if: hashFiles('cover_letter.tex') != ''
        run: |
          cp cover_letter.pdf Pham_Huy_Thanh_Cover_Letter.pdf
          cp cover_letter_vi.pdf Pham_Huy_Thanh_Cover_Letter_VI.pdf

      - name: List outputs
        run: ls -la *.pdf

      - name: Upload artifact (PDFs)
        uses: actions/upload-artifact@v4
        with:
          name: resume-and-cover-letter
          path: |
            Pham_Huy_Thanh_Resume.pdf
            Pham_Huy_Thanh_Resume_VI.pdf
            Pham_Huy_Thanh_Digital_Specialist_VI.pdf
            Pham_Huy_Thanh_Backend_DevOps_VI.pdf
            Pham_Huy_Thanh_System_Engineer_VI.pdf
            Pham_Huy_Thanh_Cover_Letter.pdf
            Pham_Huy_Thanh_Cover_Letter_VI.pdf

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            main.log
            main.aux
            main_vi.log
            main_vi.aux
            MBF_main_vi.log
            MBF_main_vi.aux
            go_devops_main_vi.log
            go_devops_main_vi.aux
            system_main_vi.log
            system_main_vi.aux
            cover_letter.log
            cover_letter.aux
            cover_letter_vi.log
            cover_letter_vi.aux

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-pdf
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog from commit history
        run: |
          set -euo pipefail
          
          LAST_TAG=""
          BUILD_TAGS=$(git tag -l "build-*" 2>/dev/null || true)
          
          if [ -n "$BUILD_TAGS" ]; then
            LAST_TAG=$(echo "$BUILD_TAGS" | sed 's/build-//' | sort -n | tail -1 | sed 's/^/build-/')
            echo "Found last successful build tag: ${LAST_TAG}" >&2
          else
            echo "No build tags found, will include all commits" >&2
          fi
          
          {
            echo "## Changelog ($(date -u +"%Y-%m-%d %H:%M:%S") UTC)"
            echo ""
            
            if [ -n "$LAST_TAG" ]; then
              COMMIT_RANGE="${LAST_TAG}..HEAD"
              echo "Getting commits from ${LAST_TAG} to HEAD" >&2
              
              COMMITS=$(git log "${COMMIT_RANGE}" --no-merges --oneline 2>/dev/null || true)
              if [ -n "$COMMITS" ]; then
                git log "${COMMIT_RANGE}" --no-merges --pretty=format:"*   **%s** (%h)"
              else
                echo "- No new commits since ${LAST_TAG}"
              fi
            else
              echo "### All Commits (no previous successful build found)"
              echo ""
              git log --no-merges --pretty=format:"*   **%s** (%h)" | head -20
            fi
            
          } > release_notes.md
          
          if [ ! -s release_notes.md ] || ! grep -q "^\*" release_notes.md; then
            {
              echo "## Changelog ($(date -u +"%Y-%m-%d %H:%M:%S") UTC)"
              echo ""
              echo "### Recent Changes"
              echo ""
              git log -n 10 --no-merges --pretty=format:"*   **%s** (%h)" 2>/dev/null || echo "- No commits found."
            } > release_notes.md
          fi
          
          echo "=== Changelog Preview (first 30 lines) ==="
          head -30 release_notes.md
          echo ""
          echo "=== Total lines in changelog ==="
          wc -l release_notes.md || echo "0"
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: resume-and-cover-letter
          path: dist
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Automated Build ${{ github.run_number }}
          body_path: release_notes.md
          files: |
            dist/Pham_Huy_Thanh_Resume.pdf
            dist/Pham_Huy_Thanh_Resume_VI.pdf
            dist/Pham_Huy_Thanh_Digital_Specialist_VI.pdf
            dist/Pham_Huy_Thanh_Backend_DevOps_VI.pdf
            dist/Pham_Huy_Thanh_System_Engineer_VI.pdf
            dist/Pham_Huy_Thanh_Cover_Letter.pdf
            dist/Pham_Huy_Thanh_Cover_Letter_VI.pdf
